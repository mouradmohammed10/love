<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --rose: #e04a6a;
  --deep-rose: #a02040;
  --gold: #d4a245;
  --cream: #fdf0f4;
  --dark: #08030d;
  --mid: #140820;
}

html, body {
  height: 100%;
  background: var(--dark);
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
  user-select: none;
}

/* ═══════════════════════════════
   CANVAS BG
═══════════════════════════════ */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ═══════════════════════════════
   SCENES
═══════════════════════════════ */
.scene {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.7s ease;
}
.scene.active {
  opacity: 1;
  pointer-events: all;
}

/* ═══════════════════════════════
   SCENE 0 — INTRO
═══════════════════════════════ */
#scene0 .envelope {
  width: 110px;
  height: 80px;
  background: linear-gradient(145deg, #f9dce8, #f0b8cc);
  border-radius: 8px;
  position: relative;
  box-shadow: 0 8px 40px rgba(224,74,106,0.4), 0 0 80px rgba(224,74,106,0.15);
  cursor: pointer;
  animation: envFloat 3s ease-in-out infinite;
  margin-bottom: 32px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
#scene0 .envelope:hover {
  transform: scale(1.07) translateY(-4px);
  box-shadow: 0 16px 60px rgba(224,74,106,0.6), 0 0 100px rgba(224,74,106,0.25);
}
#scene0 .envelope::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(160deg, #f5c8d8, #eaa0bc);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-radius: 8px 8px 0 0;
  transition: transform 0.5s ease;
  transform-origin: top center;
}
#scene0 .envelope.open::before {
  transform: rotateX(180deg);
}
#scene0 .envelope .seal {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes envFloat {
  0%,100% { transform: translateY(0) rotate(-1deg); }
  50%      { transform: translateY(-12px) rotate(1deg); }
}

.intro-hint {
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  letter-spacing: 2px;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ═══════════════════════════════
   SCENE CARD (shared)
═══════════════════════════════ */
.scene-card {
  width: min(400px, 92vw);
  background: linear-gradient(160deg, #fdf5f8, #fce6ef);
  border-radius: 28px;
  padding: 40px 34px 36px;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(212,162,69,0.2),
    0 30px 80px rgba(0,0,0,0.7),
    0 0 60px rgba(224,74,106,0.15);
  overflow: hidden;
}
.scene-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255,255,255,0.55), transparent);
  pointer-events: none;
  border-radius: 28px;
}
.card-rim {
  position: absolute;
  inset: 8px;
  border-radius: 22px;
  border: 1px solid rgba(212,162,69,0.15);
  pointer-events: none;
}

/* scene number badge */
.scene-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(224,74,106,0.1);
  border: 1px solid rgba(224,74,106,0.25);
  border-radius: 99px;
  padding: 4px 14px;
  font-size: 11px;
  color: var(--rose);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
  font-weight: 700;
}

.scene-icon {
  font-size: 42px;
  text-align: center;
  display: block;
  margin-bottom: 16px;
  animation: pulse 1.8s ease-in-out infinite;
  filter: drop-shadow(0 0 14px rgba(224,74,106,0.5));
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.12); }
}

.scene-text {
  font-size: 17px;
  line-height: 2.1;
  color: #2a0e18;
  text-align: center;
  margin-bottom: 8px;
}
.scene-text em {
  font-style: normal;
  color: var(--rose);
  font-weight: 700;
}

/* ═══════════════════════════════
   NAV BUTTON
═══════════════════════════════ */
.nav-btn { touch-action: manipulation;
  margin-top: 28px;
  background: linear-gradient(135deg, var(--rose), var(--deep-rose));
  color: white;
  border: none;
  border-radius: 99px;
  padding: 14px 36px;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(224,74,106,0.45);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
}
.nav-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
  border-radius: 99px;
}
.nav-btn:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 14px 40px rgba(224,74,106,0.6);
}
.nav-btn:active {
  transform: scale(0.97);
}

/* ═══════════════════════════════
   PROGRESS DOTS
═══════════════════════════════ */
.dots {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 20;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  transition: all 0.3s ease;
}
.dot.active {
  background: var(--rose);
  box-shadow: 0 0 10px rgba(224,74,106,0.8);
  width: 22px;
  border-radius: 99px;
}

/* ═══════════════════════════════
   FINAL SCENE
═══════════════════════════════ */
#scene5 .scene-card {
  background: linear-gradient(160deg, #1a0510, #2a0818);
  box-shadow:
    0 0 0 1px rgba(212,162,69,0.3),
    0 30px 80px rgba(0,0,0,0.8),
    0 0 100px rgba(224,74,106,0.3);
}
#scene5 .scene-text {
  color: #fce8ef;
}
#scene5 .final-hearts {
  display: flex;
  justify-content: center;
  gap: 10px;
  font-size: 28px;
  margin: 20px 0 10px;
}
#scene5 .final-hearts span {
  animation: pulse 1.5s ease-in-out infinite;
}
#scene5 .final-hearts span:nth-child(2) { animation-delay: 0.25s; font-size: 36px; }
#scene5 .final-hearts span:nth-child(3) { animation-delay: 0.5s; }

/* ═══════════════════════════════
   CLICK PARTICLES
═══════════════════════════════ */
.particle {
  position: fixed;
  pointer-events: none;
  font-size: 20px;
  z-index: 999;
  animation: floatUp 1s ease forwards;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3) rotate(20deg); }
}

/* ═══════════════════════════════
   TRANSITION FLASH
═══════════════════════════════ */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}

/* typewriter cursor */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--rose);
  margin-right: 2px;
  vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="flash"></div>

<!-- DOTS -->
<div class="dots" id="dots">
  <div class="dot active" data-i="0"></div>
  <div class="dot" data-i="1"></div>
  <div class="dot" data-i="2"></div>
  <div class="dot" data-i="3"></div>
  <div class="dot" data-i="4"></div>
  <div class="dot" data-i="5"></div>
</div>

<!-- ══ SCENE 0: INTRO ══ -->
<div class="scene active" id="scene0">
  <div class="envelope" id="envBtn">
    <div class="seal">💌</div>
  </div>
  <div class="intro-hint">اضغطي لتفتحي</div>
</div>

<!-- ══ SCENE 1 ══ -->
<div class="scene" id="scene1">
  <div class="scene-card">
    <div class="card-rim"></div>
    <div class="scene-badge">✦ مشهد ١</div>
    <span class="scene-icon">😶‍🌫️</span>
    <div class="scene-text" id="txt1"></div>
    <button class="nav-btn" onclick="goTo(2)">وبعدين؟ ◀</button>
  </div>
</div>

<!-- ══ SCENE 2 ══ -->
<div class="scene" id="scene2">
  <div class="scene-card">
    <div class="card-rim"></div>
    <div class="scene-badge">✦ مشهد ٢</div>
    <span class="scene-icon">🌙</span>
    <div class="scene-text" id="txt2"></div>
    <button class="nav-btn" onclick="goTo(3)">كمّل ◀</button>
  </div>
</div>

<!-- ══ SCENE 3 ══ -->
<div class="scene" id="scene3">
  <div class="scene-card">
    <div class="card-rim"></div>
    <div class="scene-badge">✦ مشهد ٣</div>
    <span class="scene-icon">💫</span>
    <div class="scene-text" id="txt3"></div>
    <button class="nav-btn" onclick="goTo(4)">وبعدين؟ ◀</button>
  </div>
</div>

<!-- ══ SCENE 4 ══ -->
<div class="scene" id="scene4">
  <div class="scene-card">
    <div class="card-rim"></div>
    <div class="scene-badge">✦ مشهد ٤</div>
    <span class="scene-icon">🌹</span>
    <div class="scene-text" id="txt4"></div>
    <button class="nav-btn" onclick="goTo(5)">الأخير ◀</button>
  </div>
</div>

<!-- ══ SCENE 5: FINALE ══ -->
<div class="scene" id="scene5">
  <div class="scene-card">
    <div class="card-rim"></div>
    <div class="scene-badge" style="background:rgba(212,162,69,0.15);border-color:rgba(212,162,69,0.4);color:#d4a245;">✦ النهاية</div>
    <div class="final-hearts">
      <span>🤍</span><span>💗</span><span>🤍</span>
    </div>
    <div class="scene-text" id="txt5"></div>
    <button class="nav-btn" onclick="goTo(0)" style="background:linear-gradient(135deg,#d4a245,#a07020);margin-top:20px;">من الأول ↺</button>
  </div>
</div>

<script>
// ── CANVAS STARFIELD ──
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, stars = [], hearts2 = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// build stars
for (let i = 0; i < 180; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.4 + 0.3,
    a: Math.random(),
    da: (Math.random() * 0.008 + 0.003) * (Math.random() < .5 ? 1 : -1),
    hue: Math.random() < 0.15 ? 340 : 0,
  });
}

// floating bg hearts
for (let i = 0; i < 12; i++) {
  hearts2.push({
    x: Math.random() * 100,
    y: Math.random() * 100,
    s: Math.random() * 16 + 8,
    vy: -(Math.random() * 0.025 + 0.01),
    a: Math.random() * 0.18 + 0.04,
    t: Math.random() * 100,
  });
}

function drawHeart(ctx, x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s / 30, s / 30);
  ctx.beginPath();
  ctx.moveTo(0, -10);
  ctx.bezierCurveTo(10, -20, 25, -5, 0, 12);
  ctx.bezierCurveTo(-25, -5, -10, -20, 0, -10);
  ctx.fill();
  ctx.restore();
}

function render() {
  // deep gradient bg
  const grd = ctx.createRadialGradient(W*.5, 0, 0, W*.5, H*.5, H);
  grd.addColorStop(0,   '#2a0818');
  grd.addColorStop(0.5, '#100510');
  grd.addColorStop(1,   '#08030d');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // stars
  stars.forEach(s => {
    s.a = Math.max(0.05, Math.min(1, s.a + s.da));
    if (s.a <= 0.05 || s.a >= 1) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.hue
      ? `hsla(${s.hue},80%,75%,${s.a})`
      : `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  // bg floating hearts
  hearts2.forEach(h => {
    h.t += 0.015;
    h.y += h.vy;
    if (h.y * H < -40) h.y = 1.05;
    ctx.fillStyle = `rgba(224,74,106,${h.a + Math.sin(h.t) * 0.04})`;
    drawHeart(ctx, h.x / 100 * W, h.y * H, h.s);
  });

  requestAnimationFrame(render);
}
render();

// ── SCENES & TYPEWRITER ──
const texts = {
  1: `بقالي فترة عايز أقولك حاجة..\nإني كنت غلطان، وإن أسلوبي كان بيأذيكي.\n<em>وآسف يا نور عيني.</em> من غير دوران.`,
  2: `إنتي بتستحملي وبتفضلي ساكتة،\nوده بيوجعني أكتر من أي حاجة تانية.`,
  3: `إنتي مش بس حبيبتي..\nإنتي اللي بشوف فيها نفسي.\nاللي من غيرها يومي مش بيكمل.\n<em>مش شايف الدنيا من غيرك خالص.</em>`,
  4: `وعارف إني ممكن أبقى صعب أحياناً..\nبس والله مفيش حد تاني في دنيتي غيرك.\n<em>سامحيني يا بت يا ثكورة.</em> 🌹`,
  5: `إنتي اللي بتوحشيني حتى وأنا جنبك.\n\nومليش غيرك، ولا عايز غيرك. 💗`,
};

let currentScene = 0;

function typeWrite(el, html, speed = 38) {
  // Convert newlines to <br> for display, keep em tags
  const parts = html.split(/(<em>.*?<\/em>|\n)/g);
  el.innerHTML = '';
  let i = 0;
  let partIdx = 0;
  let charIdx = 0;
  let currentText = '';

  function tick() {
    if (partIdx >= parts.length) return;
    const part = parts[partIdx];
    if (!part) { partIdx++; tick(); return; }

    if (part === '\n') {
      currentText += '<br>';
      el.innerHTML = currentText;
      partIdx++;
      setTimeout(tick, speed * 2);
    } else if (part.startsWith('<em>')) {
      // inject em tag at once
      currentText += part;
      el.innerHTML = currentText;
      partIdx++;
      setTimeout(tick, speed);
    } else {
      // type char by char
      if (charIdx < part.length) {
        currentText += part[charIdx];
        el.innerHTML = currentText;
        charIdx++;
        setTimeout(tick, speed);
      } else {
        charIdx = 0;
        partIdx++;
        setTimeout(tick, speed);
      }
    }
  }
  tick();
}

function flash(cb) {
  const f = document.getElementById('flash');
  f.style.opacity = 0.5;
  f.style.transition = 'opacity 0.15s ease';
  setTimeout(() => {
    f.style.opacity = 0;
    if (cb) cb();
  }, 150);
}

function updateDots(idx) {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

function goTo(idx) {
  // particles burst
  spawnParticles();
  flash(() => {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById('scene' + idx).classList.add('active');
    currentScene = idx;
    updateDots(idx);
    if (idx > 0) {
      const el = document.getElementById('txt' + idx);
      if (el) typeWrite(el, texts[idx]);
    }
  });
}

// touch-safe navigation
function makeBtn(el, idx) {
  el.addEventListener('touchend', function(e){ e.preventDefault(); goTo(idx); }, {passive:false});
}
document.querySelectorAll('.nav-btn[onclick]').forEach(btn => {
  const match = btn.getAttribute('onclick').match(/goTo\((\d+)\)/);
  if (match) {
    const idx = parseInt(match[1]);
    btn.addEventListener('touchend', function(e){ e.preventDefault(); goTo(idx); }, {passive:false});
  }
});

// envelope click
function openEnv() { document.getElementById('envBtn').classList.add('open'); setTimeout(() => goTo(1), 400); }
document.getElementById('envBtn').addEventListener('click', openEnv);
document.getElementById('envBtn').addEventListener('touchend', function(e){ e.preventDefault(); openEnv(); });

// ── CLICK PARTICLES ──
const emojis = ['💗','🌹','✨','💕','⭐','🌸'];
function spawnParticles(e) {
  const count = 5;
  const cx = e ? e.clientX : W / 2;
  const cy = e ? e.clientY : H / 2;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = (cx - 10 + (Math.random() - 0.5) * 60) + 'px';
    p.style.top  = (cy - 10) + 'px';
    p.style.animationDuration = (0.7 + Math.random() * 0.5) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

document.addEventListener('click', spawnParticles);
document.addEventListener('touchend', spawnParticles, {passive:true});
</script>
</body>
</html>
